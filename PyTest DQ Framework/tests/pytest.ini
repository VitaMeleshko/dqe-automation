[pytest]
# marks
# custom marks
markers =
    parquet_data: Tests for Parquet file validation
    smoke: Smoke tests for basic functionality
    facility_name_min_time_spent_per_visit_date: Tests for facility name min time dataset
    facility_type_avg_time_spent_per_visit_date: Tests for facility type avg time dataset
    patient_sum_treatment_cost_per_facility_type: Tests for patient treatment cost dataset
    example: Example tests
# python_files
python_files = test_*.py
# addopts
addopts =
         --strict-markers
         --tb=short
         --html=reports/index.html