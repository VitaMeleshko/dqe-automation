[pytest]
# marks
# custom marks
markers =
    parquet_data: Tests for Parquet file validation
    smoke: Smoke tests for basic functionality
    facility_name_min_time_spent_per_visit_date: Tests for specific dataset
    example: Example tests
# python_files
python_files = test_*.py
# addopts
addopts =
         --strict-markers
         --tb=short
         --html=reports/index.html